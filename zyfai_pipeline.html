<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;font-family:'Segoe UI',system-ui,sans-serif;color:#e6edf3;overflow-x:hidden}
.hdr{text-align:center;padding:22px 16px 6px}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#e6edf3}
.hdr .sub{font-size:11px;color:#58a6ff;font-family:monospace;margin-top:4px}
.pill{display:flex;align-items:center;justify-content:center;gap:8px;width:fit-content;
  margin:12px auto 16px;border:1px solid #1f6feb44;background:#161b22;border-radius:999px;
  padding:5px 18px;font-size:11px;color:#79b8ff}
.live{width:7px;height:7px;border-radius:50%;background:#3fb950;box-shadow:0 0 6px #3fb950;
  animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 16px 16px}
.filters button{border:1px solid;border-radius:6px;padding:5px 14px;font-size:11px;font-weight:600;
  cursor:pointer;background:transparent;transition:all .2s;letter-spacing:.04em}
.filters button:hover{filter:brightness(1.25)}
.filters button.active{color:#0d1117!important}
.btn-perf{color:#f78166;border-color:#f78166}.btn-perf.active{background:#f78166}
.btn-risk{color:#ffa657;border-color:#ffa657}.btn-risk.active{background:#ffa657}
.btn-stab{color:#56d364;border-color:#56d364}.btn-stab.active{background:#56d364}
.btn-tech{color:#79c0ff;border-color:#79c0ff}.btn-tech.active{background:#79c0ff}
.btn-sent{color:#d2a8ff;border-color:#d2a8ff}.btn-sent.active{background:#d2a8ff}
.btn-reset{color:#e6edf3;border-color:#30363d}.btn-reset:hover{border-color:#e6edf3}
.canvas-wrap{overflow-x:auto;padding:0 8px 8px}
svg{display:block;margin:0 auto}
.node{cursor:pointer;transition:opacity .2s}
.node rect,.node path{transition:filter .2s,stroke .2s}
.node:hover rect:first-child{filter:brightness(1.3)}
svg.has-focus .node{opacity:.18}
svg.has-focus .node.focused{opacity:1}
svg.has-focus .node.connected{opacity:.85}
svg.has-focus .edge{opacity:.08}
svg.has-focus .edge.focused-edge{opacity:1}
.edge-animated{stroke-dasharray:8 5;animation:flow 1.2s linear infinite}
@keyframes flow{to{stroke-dashoffset:-13}}
#panel{position:fixed;top:0;right:-420px;width:400px;height:100vh;
  background:#161b22;border-left:1px solid #30363d;overflow-y:auto;
  transition:right .3s cubic-bezier(.4,0,.2,1);z-index:100;padding:0}
#panel.open{right:0}
#panel-header{padding:18px 20px 14px;border-bottom:1px solid #21262d;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  position:sticky;top:0;background:#161b22;z-index:1}
#panel-badge{font-size:9px;font-weight:700;letter-spacing:.1em;margin-bottom:4px}
#panel-title{font-size:16px;font-weight:700;color:#e6edf3;line-height:1.3}
#panel-close{background:none;border:1px solid #30363d;color:#8b949e;cursor:pointer;
  border-radius:6px;padding:4px 8px;font-size:14px;flex-shrink:0;margin-top:2px}
#panel-close:hover{border-color:#e6edf3;color:#e6edf3}
#panel-body{padding:16px 20px 32px}
.p-section{margin-bottom:18px}
.p-section h3{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:#58a6ff;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #21262d}
.p-row{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start}
.p-key{font-size:10px;font-weight:600;color:#8b949e;min-width:80px;flex-shrink:0;padding-top:1px;font-family:monospace}
.p-val{font-size:11px;color:#e6edf3;font-family:monospace;line-height:1.5}
.p-note{font-size:11px;color:#8b949e;line-height:1.6;margin-top:4px}
.p-mono{font-family:monospace;font-size:10.5px;color:#a5d6ff;background:#0d1117;
  border-radius:4px;padding:8px 10px;margin-top:6px;line-height:1.7;white-space:pre-wrap;word-break:break-all}
#tooltip{position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:6px;
  padding:7px 12px;font-size:11px;color:#e6edf3;pointer-events:none;z-index:200;
  opacity:0;transition:opacity .15s;max-width:260px;line-height:1.5}
#tooltip.show{opacity:1}
</style>
</head>

<script>
const META = {

    ]

    sections:[{h:'Source',rows:[['Workflow','debank_scraper.yml'],['Guard','< 180 min freshness check']]},
    {h:'Note',note:'Contains Zyfai usdc_native_balance + base APY from DeBank. The rZFI token incentive portion is added separately by yield_summation.py using the price from Step 2.'}]},

    sections:[{h:'Data',rows:[['Fields','aum_usd · deposits_usd · withdrawals_usd · day'],['agent_name','"Zyfai"']]},
    {h:'Note',note:'PRIMARY time series for compute_scores.py. All rolling perf/risk/stab/sent calculations use scattering_ingest filtered by agent_name = "Zyfai".'}]},

  'n-ethos-api': {badge:'EXTERNAL API',badgeColor:'#58a6ff',title:'Ethos Network API',

  'n-tech-research': {badge:'MANUAL DATA',badgeColor:'#79c0ff',title:'Tech Research Data',
    sections:[{h:'Process',note:'Manually entered into technical_research_ingest. Direct DB insert.'}]},
  'n-security': {badge:'SCANNER',badgeColor:'#79c0ff',title:'Audit / Scan Tools',
    sections:[{h:'Maps to',rows:[['risk_smart_contract_score','zyfai_scores_raw_daily'],['tech_vulnerability_count','count']]}]},
  'n-lindy-config': {badge:'STATIC CONFIG',badgeColor:'#56d364',title:'lindy_start_dates.json',
    sections:[{h:'Zyfai entry',mono:'{\n  "Zyfai": "2024-06-09"\n}'},
    {h:'Note',note:'Zyfai is the oldest agent (live since 2024-06-09), giving it the highest stab_lindy_days among active agents.'},
    {h:'Usage',rows:[['Weight','40% of Stability'],['Cap','1095 days (3 years)']]}]},
  'n-sc-yield': {badge:'PYTHON SCRIPTS · STEPS 3 & 4',badgeColor:'#79b8ff',title:'yield_summation.py + db_update.py',
    sections:[
      {h:'Zyfai-specific in yield_summation.py', rows:[
        ['Reads','zyfai_reward_price_current.json'],
        ['_load_zyfai_reward_price()','Returns (price_usd, fetched_at)'],
        ['Effect','token_incentives × price_usd → apy_native includes rZFI'],
      ]},
      {h:'db_update.py', rows:[['Writes','yield_summation_historical_raw'],['Also updates','agents_raw (apy_native)'],['Calls','ingest_scattering.py internally']]},
      {h:'APY formula', mono:'# yield_summation for Zyfai:\napy_native = base_usdc_apy\n           + (rzfi_token_incentives_usd\n              / total_balance_usd * 365)'},
    ]
  },
  'n-compute': {badge:'PYTHON SCRIPT · STEP 7',badgeColor:'#a78bfa',title:'compute_scores.py — Zyfai',
    sections:[{h:'Category Weights',rows:[['Performance','0.30'],['Risk','0.25'],['Stability','0.20'],['Sentiment','0.15'],['Technical','0.10']]},
    {h:'Agent',rows:[['agent_name','"Zyfai"'],['table_prefix','zyfai'],['series_table','scattering_ingest']]},
    {h:'Key Note',note:'perf_yield_apy_native for Zyfai includes rZFI token incentives (valued in USD by Step 2). This makes Zyfai yield-boosted compared to pure USDC agents like Mamo/Surfliquid.'},
    {h:'Lindy',note:'Zyfai started 2024-06-09 — oldest active agent. Its stab_lindy_days is highest, contributing most to its Stability score.'}]},
  'n-target': {badge:'TARGET TABLE · backend_only',badgeColor:'#d2a8ff',title:'zyfai_scores_raw_daily',
    sections:[{h:'Primary Key',rows:[['as_of_date','date NOT NULL']]},
    {h:'Key difference vs other agents',note:'perf_yield_apy_native reflects rZFI token rewards priced in USD, not just base staking APY. This is the only agent where Step 2 (price fetch) meaningfully affects a scoring metric.'},
    {h:'Columns',mono:'as_of_date                date  PK\ncomputed_at               timestamptz\nperf_annualized_return_30 numeric\nperf_sharpe_30            numeric\nperf_yield_apy_native     numeric  ← incl. rZFI\nrisk_mdd_90  risk_mdd_30   numeric\nstab_lindy_days           numeric  ← highest\n... (same structure as other agents)'}]},
  'n-scored': {badge:'SCORED TABLE · read_public',badgeColor:'#3fb950',title:'zyfai_scores_daily',
    sections:[{h:'vs raw',note:'zyfai_scores_raw_daily → raw values. zyfai_scores_daily → sigmoid-transformed 0–100 + category aggregates + missing_fields.'},
    {h:'RLS',rows:[['Policy','read_public'],['Consumers','Frontend · agents_scores view']]}]},
  'n-upscaled': {badge:'SNAPSHOT',badgeColor:'#3fb950',title:'agents_scores_upscaled',
    sections:[{h:'Formula',mono:'upscale(v) = 60 + (v / 100) * 40'}]},
  'n-bond': {badge:'AGGREGATED · read_public',badgeColor:'#e3b341',title:'bond_score_daily',
    sections:[{h:'Bond Score Weights',rows:[['Performance','30%'],['Risk','25%'],['Stability','20%'],['Sentiment','15%'],['Technical','10%']]}]},
};

const CONN = {
  'n-scraper-wf':['n-debank-script'],'n-debank-script':['n-scraper-wf','n-storage'],
  'n-storage':['n-debank-script','n-guard'],'n-guard':['n-storage'],
  'n-coingecko':['n-sc-zyfai-price'],'n-sc-zyfai-price':['n-coingecko','n-t-zyfai-price-json'],
  'n-t-zyfai-price-json':['n-sc-zyfai-price','n-sc-yield'],
  'n-yield-file':['n-sc-yield'],'n-scatter-api':['n-sc-scatter'],
  'n-engage-api':['n-sc-engage'],'n-ethos-api':['n-sc-ethos'],
  'n-tech-research':['n-sc-manual'],'n-security':['n-sc-scan'],'n-lindy-config':['n-sc-lindy'],
  'n-sc-yield':['n-yield-file','n-t-zyfai-price-json','n-t-yshr'],
  'n-sc-scatter':['n-scatter-api','n-t-scatter'],
  'n-sc-engage':['n-engage-api','n-t-engage'],'n-sc-ethos':['n-ethos-api','n-t-ethos'],
  'n-sc-manual':['n-tech-research','n-t-tech'],'n-sc-scan':['n-security','n-t-security'],
  'n-sc-lindy':['n-lindy-config','n-compute'],
  'n-t-yshr':['n-sc-yield','n-compute'],'n-t-scatter':['n-sc-scatter','n-compute'],
  'n-t-engage':['n-sc-engage','n-compute'],'n-t-ethos':['n-sc-ethos','n-compute'],
  'n-t-tech':['n-sc-manual','n-compute'],'n-t-security':['n-sc-scan','n-compute'],
  'n-compute':['n-t-yshr','n-t-scatter','n-t-engage','n-t-ethos','n-t-tech','n-t-security','n-sc-lindy','n-target','n-scored','n-upscaled','n-bond'],
  'n-target':['n-compute'],'n-scored':['n-compute'],'n-upscaled':['n-compute'],'n-bond':['n-compute'],
};

const CAT_NODES = {
  perf:['n-coingecko','n-sc-zyfai-price','n-t-zyfai-price-json','n-yield-file','n-sc-yield','n-t-yshr','n-scatter-api','n-sc-scatter','n-t-scatter','n-compute','n-target','n-scored','n-bond'],
  risk:['n-t-scatter','n-security','n-sc-scan','n-t-security','n-compute','n-target','n-scored','n-bond'],
  stab:['n-scatter-api','n-sc-scatter','n-t-scatter','n-lindy-config','n-sc-lindy','n-compute','n-target','n-scored','n-bond'],
  tech:['n-tech-research','n-sc-manual','n-t-tech','n-security','n-sc-scan','n-t-security','n-compute','n-target','n-scored','n-bond'],
  sent:['n-scatter-api','n-sc-scatter','n-t-scatter','n-engage-api','n-sc-engage','n-t-engage','n-ethos-api','n-sc-ethos','n-t-ethos','n-compute','n-target','n-scored','n-bond'],
};

const svg=document.getElementById('dag'),panel=document.getElementById('panel'),
  pBadge=document.getElementById('panel-badge'),pTitle=document.getElementById('panel-title'),
  pBody=document.getElementById('panel-body');
let activeFilter=null;

svg.querySelectorAll('.node').forEach(node=>{
  node.addEventListener('mouseenter',()=>{
    if(activeFilter)return;
    svg.classList.add('has-focus');node.classList.add('focused');
    const c=new Set(CONN[node.id]||[]);
    svg.querySelectorAll('.node').forEach(n=>{if(c.has(n.id))n.classList.add('connected');});
    svg.querySelectorAll('.edge').forEach(e=>{if(e.dataset.from===node.id||e.dataset.to===node.id)e.classList.add('focused-edge');});
  });
  node.addEventListener('mouseleave',()=>{
    if(activeFilter)return;
    svg.classList.remove('has-focus');
    svg.querySelectorAll('.node').forEach(n=>n.classList.remove('focused','connected'));
    svg.querySelectorAll('.edge').forEach(e=>e.classList.remove('focused-edge'));
  });
  node.addEventListener('click',e=>{e.stopPropagation();openPanel(node.id);});
});

function openPanel(id){
  const m=META[id];if(!m)return;
  pBadge.textContent=m.badge;pBadge.style.color=m.badgeColor;
  pTitle.textContent=m.title;pBody.innerHTML='';
  (m.sections||[]).forEach(sec=>{
    const div=document.createElement('div');div.className='p-section';
    const h=document.createElement('h3');h.textContent=sec.h;div.appendChild(h);
    if(sec.rows)sec.rows.forEach(([k,v])=>{const r=document.createElement('div');r.className='p-row';r.innerHTML=`<span class="p-key">${k}</span><span class="p-val">${v}</span>`;div.appendChild(r);});
    if(sec.note){const n=document.createElement('div');n.className='p-note';n.textContent=sec.note;div.appendChild(n);}
    if(sec.mono){const m2=document.createElement('div');m2.className='p-mono';m2.textContent=sec.mono;div.appendChild(m2);}
    pBody.appendChild(div);
  });
  panel.classList.add('open');
}

document.getElementById('panel-close').addEventListener('click',()=>panel.classList.remove('open'));
document.addEventListener('click',e=>{if(!panel.contains(e.target))panel.classList.remove('open');});

document.querySelectorAll('.filters button[data-cat]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const cat=btn.dataset.cat;
    if(activeFilter===cat){clearFilter();return;}
    activeFilter=cat;
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const cn=new Set(CAT_NODES[cat]||[]);
    svg.classList.add('has-focus');
    svg.querySelectorAll('.node').forEach(n=>{n.classList.remove('focused','connected');if(cn.has(n.id))n.classList.add('focused');});
    svg.querySelectorAll('.edge').forEach(e=>{e.classList.remove('focused-edge');if(cn.has(e.dataset.from)&&cn.has(e.dataset.to))e.classList.add('focused-edge');});
  });
});
document.getElementById('btn-reset').addEventListener('click',clearFilter);
function clearFilter(){
  activeFilter=null;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  svg.classList.remove('has-focus');
  svg.querySelectorAll('.node').forEach(n=>n.classList.remove('focused','connected'));
  svg.querySelectorAll('.edge').forEach(e=>e.classList.remove('focused-edge'));
}
</script>
